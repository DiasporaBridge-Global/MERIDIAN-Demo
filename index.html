<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MERIDIAN | Showroom Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syncopate:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap');

        /* LAYER 1: Living Kanchipuram Silk */
        @keyframes silk-breathe { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; padding: 0; background: linear-gradient(-45deg, #0b132b, #1c2541, #0a423a, #2a0845, #1f1c0d); background-size: 400% 400%; animation: silk-breathe 18s ease-in-out infinite; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; }

        /* LAYER 2: Liquid Zarigai Gold Frame */
        #gold-frame { position: relative; width: 90%; max-width: 380px; padding: 4px; background: linear-gradient(45deg, #d4af37, #aa771c, #f3e5ab, #8a5a19, #d4af37); background-size: 300% 300%; animation: gold-flow 8s linear infinite; border-radius: 24px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(0,0,0,0.9); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        @keyframes gold-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* LAYER 3: The Vault Card */
        #vault-interior { background: rgba(11, 40, 50, 0.88); backdrop-filter: blur(25px); border-radius: 20px; padding: 45px 30px; text-align: center; }
        .shimmer-text { font-family: 'Syncopate', sans-serif; font-size: 24px; letter-spacing: 8px; margin-bottom: 5px; background: linear-gradient(90deg, #d4af37 0%, #fff 50%, #d4af37 100%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: shimmer 8s linear infinite; }
        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        #vault-subtitle { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 35px; display: block; }
        
        input.vault-input { width: 100%; padding: 18px; margin-bottom: 25px; background: rgba(0,0,0,0.7); border: 1.5px solid rgba(212, 175, 55, 0.4); border-radius: 12px; color: #fff; text-align: center; letter-spacing: 3px; font-family: 'Rajdhani', sans-serif; font-size: 16px; outline: none; }
        .btn-gold { width: 100%; padding: 18px; background: linear-gradient(135deg, #8a5a19, #d4af37); border: none; border-radius: 12px; color: #000; font-weight: 800; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; transition: transform 0.2s; }

        /* LAYER 4: The Success Sequence */
        #success-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; width: 100%; }
        .tamil-text { font-family: 'Cormorant Garamond', serif; font-size: 44px; color: #d4af37; text-shadow: 0 0 25px rgba(212, 175, 55, 0.7); opacity: 0; transform: translateY(20px); animation: float-up 1.2s forwards 0.5s; }
        @keyframes float-up { to { opacity: 1; transform: translateY(0); } }

        /* LAYER 8: The 8-Column Controller Ledger */
        #dashboard { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 25px; box-sizing: border-box; background: rgba(5, 5, 15, 0.95); backdrop-filter: blur(30px); z-index: 30; opacity: 0; transform: translateY(30px); transition: all 1.2s ease; overflow-x: auto; }
        .dash-active { opacity: 1 !important; transform: translateY(0) !important; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; margin-top: 20px; }
        th { padding: 18px; color: #d4af37; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1.5px solid rgba(212, 175, 55, 0.3); text-align: left; }
        td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; color: #eee; }
    </style>
</head>
<body>

    <div id="gold-frame">
        <div id="vault-interior">
            <h1 class="shimmer-text">MERIDIAN</h1>
            <span id="vault-subtitle">Secure Node Identification</span>
            <input type="text" id="v-input" class="vault-input" placeholder="ENTER IDENTITY" autocomplete="off">
            <button class="btn-gold" onclick="processAuth()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="success-screen">
        <div class="tamil-text">இனிய வரவு</div>
        <div style="color:#00ffcc; letter-spacing:5px; margin-top:15px; font-family:'Syncopate'; font-size:12px;">A Sweet Welcome</div>
    </div>

    <div id="dashboard">
        <h2 style="font-family:'Syncopate'; font-size:16px; color:#d4af37; letter-spacing:4px;">MERIDIAN CONTROLLER NODE</h2>
        <table>
            <thead>
                <tr>
                    <th>Project</th><th>Source Video</th><th>Tamil (Src)</th><th>English (Trg)</th><th>Tam SRT</th><th>Eng SRT</th><th>Status</th><th>Control</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color:#d4af37; font-weight:700;">DEMO-001</td>
                    <td>Diaspora Intro</td>
                    <td><button style="background:#111; color:#aaa; border:1px solid #333; padding:5px 10px; border-radius:4px;">Edit</button></td>
                    <td><button style="background:#111; color:#aaa; border:1px solid #333; padding:5px 10px; border-radius:4px;">Edit</button></td>
                    <td><button style="background:#111; color:#aaa; border:1px solid #333; padding:5px 10px; border-radius:4px;">Upload</button></td>
                    <td><button style="background:#111; color:#aaa; border:1px solid #333; padding:5px 10px; border-radius:4px;">Upload</button></td>
                    <td><span style="color:orange; border:1px solid orange; padding:2px 6px; font-size:10px; border-radius:4px;">PENDING</span></td>
                    <td><button style="background:none; color:red; border:none; font-size:18px;">✕</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let step = 1;
        function processAuth() {
            const input = document.getElementById('v-input');
            const val = input.value.trim();
            if (step === 1 && val === 'MERIDIAN-2026') {
                step = 2; input.value = ''; input.placeholder = '6-DIGIT OTP';
                document.getElementById('vault-subtitle').innerText = 'TWO-FACTOR VERIFICATION';
            } else if (step === 2 && val === '481236') {
                launchSequence();
            } else {
                input.style.borderColor = 'red';
                setTimeout(() => input.style.borderColor = 'rgba(212, 175, 55, 0.4)', 800);
            }
        }

        function launchSequence() {
            const frame = document.getElementById('gold-frame');
            const success = document.getElementById('success-screen');
            const dash = document.getElementById('dashboard');
            document.getElementById('vault-interior').style.opacity = '0';
            setTimeout(() => { frame.style.width = '0px'; frame.style.opacity = '0'; }, 500);
            success.style.display = 'block';
            setTimeout(() => {
                success.style.opacity = '0';
                dash.style.display = 'block';
                setTimeout(() => dash.classList.add('dash-active'), 50);
            }, 3500);
        }
    </script>
</body>
</html>
