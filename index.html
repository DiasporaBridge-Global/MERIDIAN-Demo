<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MERIDIAN | Showroom Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syncopate:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap');

        /* LAYER 1: The Silk Background */
        @keyframes silk-breathe { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; padding: 0; background: linear-gradient(-45deg, #0b132b, #1c2541, #0a423a, #2a0845, #1f1c0d); background-size: 400% 400%; animation: silk-breathe 18s ease-in-out infinite; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; -webkit-tap-highlight-color: transparent; }

        /* LAYER 5: Touch Interaction (Ripples) */
        .ripple { position: absolute; border-radius: 50%; background: rgba(212, 175, 55, 0.4); transform: scale(0); animation: ripple-effect 0.6s linear; pointer-events: none; z-index: 9999; }
        @keyframes ripple-effect { to { transform: scale(4); opacity: 0; } }

        /* LAYER 2: The Cast Gold Frame */
        #gold-frame { position: relative; width: 90%; max-width: 380px; padding: 3px; background: linear-gradient(45deg, #d4af37, #aa771c, #f3e5ab, #8a5a19, #d4af37); background-size: 200% 200%; animation: gold-flow 6s linear infinite; border-radius: 20px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2), inset 0 0 15px rgba(0,0,0,0.8); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        @keyframes gold-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* LAYER 3: The Login Vault */
        #vault-interior { background: rgba(11, 40, 50, 0.85); backdrop-filter: blur(12px); border-radius: 17px; padding: 40px 25px; text-align: center; position: relative; transition: opacity 0.5s ease; }
        .shimmer-text { font-family: 'Syncopate', sans-serif; font-size: 24px; letter-spacing: 6px; margin: 0 0 10px 0; background: linear-gradient(90deg, #d4af37 0%, #fff 50%, #d4af37 100%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: shimmer 8s linear infinite; }
        @keyframes shimmer { 0% { background-position: 200% center; } 20% { background-position: -200% center; } 100% { background-position: -200% center; } }
        
        #vault-subtitle { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 30px; display: block; }
        input.vault-input { width: 100%; padding: 15px; margin-bottom: 25px; background: rgba(0,0,0,0.6); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; color: #fff; text-align: center; letter-spacing: 2px; font-family: 'Rajdhani', sans-serif; font-size: 16px; transition: border-color 0.3s ease; }
        input.vault-input:focus { border-color: #d4af37; outline: none; }
        .btn-gold { width: 100%; padding: 15px; background: linear-gradient(135deg, #8a5a19, #d4af37); border: none; border-radius: 8px; color: #000; font-weight: 700; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; font-size: 16px; transition: transform 0.1s; }
        .btn-gold:active { transform: scale(0.98); }

        /* LAYER 4: Success Sequence */
        #success-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; width: 100%; pointer-events: none; }
        .tamil-text { font-family: 'Cormorant Garamond', serif; font-size: 42px; color: #d4af37; text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); opacity: 0; transform: translateY(20px); animation: float-up 1s forwards 0.5s; }
        .english-text { font-family: 'Syncopate', sans-serif; font-size: 12px; color: #00ffcc; letter-spacing: 5px; text-transform: uppercase; margin-top: 15px; opacity: 0; animation: fade-in 1s forwards 1.5s; }
        @keyframes float-up { to { opacity: 1; transform: translateY(0); } }
        @keyframes fade-in { to { opacity: 1; } }

        /* DASHBOARD ENGINE (Hidden Initially) */
        #dashboard { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; background: rgba(5, 5, 15, 0.9); backdrop-filter: blur(20px); z-index: 30; opacity: 0; transform: translateY(20px); transition: all 1s ease; overflow-y: auto; }
        .dash-active { opacity: 1 !important; transform: translateY(0) !important; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; margin-bottom: 20px; }
        .header-bar h2 { margin: 0; color: #d4af37; font-family: 'Syncopate', sans-serif; font-size: 14px; letter-spacing: 2px; }
        
        /* Toggle & Table */
        .controls { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .toggle-btn { background: #111; border: 1px solid #333; color: #888; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 14px; }
        .toggle-btn.active { background: rgba(212, 175, 55, 0.1); border-color: #d4af37; color: #d4af37; }
        
        .table-wrapper { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: left; }
        th { padding: 15px; color: rgba(255,255,255,0.5); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: #ddd; }
        .td-code { color: #d4af37; font-weight: 600; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .badge-pending { background: rgba(255, 165, 0, 0.1); color: orange; border: 1px solid orange; }
        .badge-done { background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc; }
        .action-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 12px; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; border: 1px solid #d4af37; border-radius: 10px; padding: 25px; width: 90%; max-width: 350px; }
        .modal-content h3 { color: #d4af37; margin-top: 0; font-family: 'Syncopate', sans-serif; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body onclick="createRipple(event)">

    <div id="gold-frame">
        <div id="vault-interior">
            <h1 class="shimmer-text" id="v-title">MERIDIAN</h1>
            <span id="vault-subtitle">SECURE NODE IDENTIFICATION</span>
            <input type="text" id="v-input" class="vault-input" placeholder="ENTER IDENTITY" autocomplete="off">
            <button class="btn-gold" onclick="processAuth(event)">AUTHENTICATE</button>
        </div>
    </div>

    <div id="success-screen">
        <div class="tamil-text">இனிய வரவு</div>
        <div class="english-text">A Sweet Welcome</div>
    </div>

    <div id="dashboard">
        <div class="header-bar">
            <h2>MERIDIAN CONTROLLER</h2>
            <button class="btn-gold" style="width: auto; padding: 8px 15px; font-size: 12px;" onclick="document.getElementById('modal').style.display='flex'">+ NEW PROJECT</button>
        </div>
        
        <div class="controls">
            <button class="toggle-btn active" id="btn-te" onclick="setDir('TE')">Tamil → English</button>
            <button class="toggle-btn" id="btn-et" onclick="setDir('ET')">English → Tamil</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr id="table-head">
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3>INITIALIZE PROJECT</h3>
            <input type="text" id="m-code" class="vault-input" placeholder="Project Code (e.g., TRN-001)">
            <input type="text" id="m-title" class="vault-input" placeholder="Source Video Title">
            <button class="btn-gold" onclick="addProject()">CREATE</button>
            <button class="toggle-btn" style="width: 100%; margin-top: 10px;" onclick="document.getElementById('modal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <script>
        // LAYER 5: Liquid Touch Physics
        function createRipple(e) {
            const body = document.querySelector('body');
            const circle = document.createElement('div');
            const d = Math.max(body.clientWidth, body.clientHeight);
            circle.style.width = circle.style.height = d + 'px';
            circle.style.left = e.clientX - d / 2 + 'px';
            circle.style.top = e.clientY - d / 2 + 'px';
            circle.classList.add('ripple');
            body.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        }

        // 2-STEP OTP ENGINE (From your original blueprint)
        let authStep = 1;
        function processAuth(e) {
            e.stopPropagation();
            const inputField = document.getElementById('v-input');
            const val = inputField.value.trim();

            if (authStep === 1 && val === 'MERIDIAN-2026') {
                authStep = 2;
                inputField.value = '';
                inputField.type = 'number';
                inputField.placeholder = '6-DIGIT OTP';
                document.getElementById('vault-subtitle').innerText = 'TWO-FACTOR VERIFICATION';
            } 
            else if (authStep === 2 && val === '481236') {
                launchSuccessSequence();
            } 
            else {
                inputField.style.borderColor = '#ff4444';
                setTimeout(() => inputField.style.borderColor = 'rgba(212, 175, 55, 0.3)', 1000);
            }
        }

        // TRANSITION ENGINE
        function launchSuccessSequence() {
            const frame = document.getElementById('gold-frame');
            const success = document.getElementById('success-screen');
            const dashboard = document.getElementById('dashboard');

            // Fade out vault
            document.getElementById('vault-interior').style.opacity = '0';
            setTimeout(() => {
                frame.style.width = '0px'; frame.style.height = '0px'; frame.style.padding = '0px'; frame.style.opacity = '0';
            }, 400);

            // Show "இனிய வரவு"
            success.style.display = 'block';

            // Hold for 3 seconds, then reveal Dashboard
            setTimeout(() => {
                success.style.opacity = '0';
                success.style.transition = 'opacity 0.5s ease';
                
                dashboard.style.display = 'block';
                setTimeout(() => {
                    dashboard.classList.add('dash-active');
                    renderTable(); // Boot up the ledger
                }, 100);
            }, 3500);
        }

        // DASHBOARD ENGINE (Extracted from your existing code)
        let currentDir = 'TE';
        let projects = [
            { id: '1', code: 'DEMO-001', video: 'Diaspora Intro', status: 'Pending', dir: 'TE' }
        ];

        function setDir(dir) {
            currentDir = dir;
            document.getElementById('btn-te').classList.toggle('active', dir === 'TE');
            document.getElementById('btn-et').classList.toggle('active', dir === 'ET');
            renderTable();
        }

        function renderTable() {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            
            if (currentDir === 'TE') {
                thead.innerHTML = `<th>Code</th><th>Source Video</th><th>Tamil (Src)</th><th>English (Trg)</th><th>Tam SRT</th><th>Eng SRT</th><th>Status</th><th>Actions</th>`;
            } else {
                thead.innerHTML = `<th>Code</th><th>Source Video</th><th>English (Src)</th><th>Tamil (Trg)</th><th>Eng SRT</th><th>Tam SRT</th><th>Status</th><th>Actions</th>`;
            }

            const filtered = projects.filter(p => p.dir === currentDir);
            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td class="td-code">${p.code}</td>
                    <td>${p.video}</td>
                    <td><button class="action-btn">Edit Text</button></td>
                    <td><button class="action-btn">Edit Text</button></td>
                    <td><button class="action-btn">Upload</button></td>
                    <td><button class="action-btn">Upload</button></td>
                    <td><span class="badge badge-${p.status.toLowerCase()}">${p.status}</span></td>
                    <td><button class="action-btn" onclick="deleteProject('${p.id}')">✕</button></td>
                </tr>
            `).join('');
        }

        function addProject() {
            const code = document.getElementById('m-code').value.trim();
            const video = document.getElementById('m-title').value.trim();
            if (!code || !video) return;
            projects.push({ id: Date.now().toString(), code, video, status: 'Pending', dir: currentDir });
            document.getElementById('m-code').value = '';
            document.getElementById('m-title').value = '';
            document.getElementById('modal').style.display = 'none';
            renderTable();
        }

        function deleteProject(id) {
            projects = projects.filter(p => p.id !== id);
            renderTable();
        }
    </script>
</body>
</html>
